name: softlab_auth
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  # get: ^4.7.3
  http: ^1.6.0
  keyboard_actions: ^4.2.1
  shared_preferences: ^2.5.3
  device_info_plus: ^12.3.0
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/ 
    - assets/images/


  # example:
  fonts:
    - family: BeVietnam
      fonts:
       - asset: assets/fonts/BeVietnamPro-Thin.ttf
         weight: 100
       - asset: assets/fonts/BeVietnamPro-ExtraLight.ttf
         weight: 200
       - asset: assets/fonts/BeVietnamPro-Light.ttf
         weight: 300
       - asset: assets/fonts/BeVietnamPro-Regular.ttf
         weight: 400
       - asset: assets/fonts/BeVietnamPro-Medium.ttf
         weight: 500
       - asset: assets/fonts/BeVietnamPro-SemiBold.ttf
         weight: 600
       - asset: assets/fonts/BeVietnamPro-Bold.ttf
         weight: 700
       - asset: assets/fonts/BeVietnamPro-ExtraBold.ttf
         weight: 800
       - asset: assets/fonts/BeVietnamPro-Black.ttf
         weight: 900
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
